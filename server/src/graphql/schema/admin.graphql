type AdminCashoutRequest {
  id: ID!
  userId: ID!
  tokensAmount: Int!
  cashAmount: Float!
  status: String!
  payoutMethod: String!
  payoutDetails: String!
  adminNote: String
  reviewedAt: String
  createdAt: String!
  user: AdminCashoutUser!
}

type AdminCashoutUser {
  id: ID!
  username: String!
  displayName: String!
  email: String!
  tokenBalance: Int!
  tokensEarned: Int!
}

type AdminCredentialsResult {
  valid: Boolean!
  role: String
  name: String
}

type AdminUserItem {
  id: ID!
  email: String!
  role: String!
  name: String
  createdAt: String!
}

extend type Mutation {
  adminVerifyCredentials(email: String!, password: String!): AdminCredentialsResult!
  adminCreateAdmin(email: String!, password: String!, role: String!, name: String): AdminUserItem!
  adminUpdateAdmin(id: ID!, role: String, name: String): AdminUserItem!
  adminRemoveAdmin(id: ID!): Boolean!
  adminReviewCashoutRequest(id: ID!, status: String!, adminNote: String): Boolean!

  adminCreateBot(
    username: String!
    displayName: String!
    institution: String
    program: String
    profilePicture: String
  ): User!

  adminCreatePostAsBot(
    botId: ID!
    fileBase64: String!
    thumbnailBase64: String
    fileName: String!
    mimeType: String!
    title: String!
    categories: [String!]!
    description: String
    year: Int
  ): Post!
}

type AdminActivityItem {
  type: String!
  user: String!
  action: String!
  target: String!
  time: String!
}

type AdminReportItem {
  id: ID!
  category: String!
  title: String!
  resolved: Boolean!
  createdAt: String!
  username: String!
}

type AdminTrendingDoc {
  id: ID!
  rank: Int!
  title: String!
  category: String!
  viewCount: Int!
}

type AdminStats {
  totalUsers: Int!
  newUsersToday: Int!
  uploadsToday: Int!
  pendingReviews: Int!
  pendingPayouts: Int!
  revenueThisMonth: Float!
  uploadBars: [Int!]!
  revenueChart: [Float!]!
  recentActivity: [AdminActivityItem!]!
  latestReports: [AdminReportItem!]!
  trendingDocs: [AdminTrendingDoc!]!
}

extend type Query {
  adminListBots: [User!]!
  adminListCashoutRequests(status: String, limit: Int = 50, offset: Int = 0): [AdminCashoutRequest!]!
  adminStats: AdminStats!
  adminListAdmins: [AdminUserItem!]!
}
