type AdminCashoutRequest {
  id: ID!
  userId: ID!
  tokensAmount: Int!
  cashAmount: Float!
  status: String!
  payoutMethod: String!
  payoutDetails: String!
  adminNote: String
  reviewedAt: String
  createdAt: String!
  user: AdminCashoutUser!
}

type AdminCashoutUser {
  id: ID!
  username: String!
  displayName: String!
  email: String!
  tokenBalance: Int!
  tokensEarned: Int!
}

type AdminCredentialsResult {
  valid: Boolean!
  role: String
  name: String
}

type AdminUserItem {
  id: ID!
  email: String!
  role: String!
  name: String
  createdAt: String!
}

extend type Mutation {
  adminVerifyCredentials(email: String!, password: String!): AdminCredentialsResult!
  adminCreateAdmin(email: String!, password: String!, role: String!, name: String): AdminUserItem!
  adminUpdateAdmin(id: ID!, role: String, name: String): AdminUserItem!
  adminRemoveAdmin(id: ID!): Boolean!
  adminReviewCashoutRequest(id: ID!, status: String!, adminNote: String): Boolean!

  adminCreateBot(
    username: String!
    displayName: String!
    institution: String
    program: String
    profilePicture: String
  ): User!

  adminCreatePostAsBot(
    botId: ID!
    fileBase64: String!
    thumbnailBase64: String
    fileName: String!
    mimeType: String!
    title: String!
    categories: [String!]!
    description: String
    year: Int
  ): Post!
}

type AdminActivityItem {
  type: String!
  user: String!
  action: String!
  target: String!
  time: String!
}

type AdminReportItem {
  id: ID!
  category: String!
  title: String!
  resolved: Boolean!
  createdAt: String!
  username: String!
}

type AdminTrendingDoc {
  id: ID!
  rank: Int!
  title: String!
  category: String!
  viewCount: Int!
}

type AdminStats {
  totalUsers: Int!
  newUsersToday: Int!
  uploadsToday: Int!
  pendingReviews: Int!
  pendingPayouts: Int!
  revenueThisMonth: Float!
  storageBytes: Float!
  uploadBars: [Int!]!
  revenueChart: [Float!]!
  recentActivity: [AdminActivityItem!]!
  latestReports: [AdminReportItem!]!
  trendingDocs: [AdminTrendingDoc!]!
}

type AdminPostItem {
  id: ID!
  title: String!
  authorId: String
  authorUsername: String
  categories: [String!]!
  fileType: String!
  viewCount: Int!
  likeCount: Int!
  downloadCount: Int!
  revenue: Float!
  createdAt: String!
  deleted: Boolean!
  thumbnailUrl: String
}

type AdminPostsPage {
  posts: [AdminPostItem!]!
  total: Int!
}

type AdminCategoryStat {
  name: String!
  count: Int!
}

type AdminFileTypeStat {
  type: String!
  count: Int!
  percent: Float!
}

type AdminUploadStats {
  totalActive: Int!
  totalRemoved: Int!
  categories: [AdminCategoryStat!]!
  fileTypes: [AdminFileTypeStat!]!
}

type AdminPostUrls {
  fileUrl: String!
  fileType: String!
  renderedHtml: String
}

type AdminPlagiarismCase {
  id: ID!
  originalPostId: ID!
  originalTitle: String!
  originalAuthor: String
  suspectedPostId: ID!
  suspectedTitle: String!
  suspectedAuthor: String
  similarityScore: Float!
  verdict: String!
  status: String!
  createdAt: String!
}

extend type Query {
  adminListBots: [User!]!
  adminListCashoutRequests(status: String, limit: Int = 50, offset: Int = 0): [AdminCashoutRequest!]!
  adminStats: AdminStats!
  adminListAdmins: [AdminUserItem!]!
  adminListPosts(limit: Int, offset: Int, search: String, deleted: Boolean): AdminPostsPage!
  adminUploadStats: AdminUploadStats!
  adminGetPostUrls(id: ID!): AdminPostUrls!
  adminListPlagiarismCases(status: String, limit: Int, offset: Int): [AdminPlagiarismCase!]!
}

extend type Mutation {
  adminDeletePost(id: ID!): Boolean!
  adminRestorePost(id: ID!): Boolean!
}
