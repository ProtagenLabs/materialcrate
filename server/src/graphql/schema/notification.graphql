type Notification {
  id: ID!
  type: String!
  actorId: ID
  actorUsername: String
  postId: ID
  commentId: ID
  caseId: ID
  followRequestId: ID
  achievementId: ID
  title: String!
  description: String!
  icon: String!
  profilePicture: String
  unread: Boolean!
  time: String!
}

extend type Query {
  notifications(limit: Int = 50, unreadOnly: Boolean = false): [Notification!]!
}

extend type Mutation {
  createNotification(
    type: String
    title: String!
    description: String!
    icon: String!
    profilePicture: String
    userId: ID
    postId: ID
    commentId: ID
  ): Notification!
  markNotificationRead(notificationId: ID!): Notification!
  markAllNotificationsRead: Boolean!
}
