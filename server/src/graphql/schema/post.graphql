type Post {
  id: ID!
  fileUrl: String!
  thumbnailUrl: String
  fileType: String!
  renderedHtmlUrl: String
  title: String!
  categories: [String!]!
  description: String
  year: Int
  author: User
  likeCount: Int!
  commentCount: Int!
  commentsDisabled: Boolean!
  comments(limit: Int = 20, offset: Int = 0): [Comment!]!
  viewerHasLiked: Boolean!
  viewCount: Int!
  pinned: Boolean!
  isFree: Boolean!
  price: Float!
  viewerHasPurchased: Boolean!
  createdAt: String!
  deleted: Boolean!
  deletedAt: String
}

type PostVersion {
  id: ID!
  postId: ID!
  versionNumber: Int!
  title: String!
  categories: [String!]!
  description: String
  year: Int
  fileUrl: String!
  thumbnailUrl: String
  editor: User
  createdAt: String!
}

type Comment {
  id: ID!
  post: Post!
  postId: ID!
  parentId: ID
  parent: Comment
  replies(limit: Int = 20, offset: Int = 0): [Comment!]!
  replyCount: Int!
  author: User!
  content: String!
  likeCount: Int!
  viewerHasLiked: Boolean!
  createdAt: String!
  updatedAt: String!
}

input FeedInteractionInput {
  postId: ID
  interactionType: String!
  signalKind: String
  category: String
  searchTerm: String
  durationMs: Int
  metadata: String
}

extend type Query {
  post(id: ID!): Post
  postVersions(postId: ID!): [PostVersion!]!
  posts(authorUsername: String, limit: Int = 50, offset: Int = 0): [Post!]!
  searchPosts(query: String!, limit: Int = 12, offset: Int = 0): [Post!]!
  recentlyDeletedPosts(limit: Int = 50, offset: Int = 0): [Post!]!
  postRenderedHtml(id: ID!): String
  comments(
    postId: ID!
    parentCommentId: ID
    limit: Int = 50
    offset: Int = 0
  ): [Comment!]!
}

extend type Mutation {
  createPost(
    fileBase64: String!
    thumbnailBase64: String
    fileName: String!
    mimeType: String!
    title: String!
    categories: [String!]!
    description: String
    year: Int
    isFree: Boolean
    price: Float
  ): Post!
  updatePost(
    postId: ID!
    title: String!
    categories: [String!]!
    description: String
    year: Int
    isFree: Boolean
    price: Float
  ): Post!
  deletePost(postId: ID!): Boolean!
  restorePost(postId: ID!): Boolean!
  permanentlyDeletePost(postId: ID!): Boolean!
  togglePostLike(postId: ID!): Post!
  pinPostToProfile(postId: ID!): Post!
  togglePostComments(postId: ID!): Post!
  markPostNotInterested(postId: ID!): Boolean!
  trackFeedInteraction(input: FeedInteractionInput!): Boolean!
  createComment(postId: ID!, content: String!, parentCommentId: ID): Comment!
  toggleCommentLike(commentId: ID!): Comment!
}
